name: E2E Kubernetes Smoke Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create KIND Cluster
        uses: engineerd/setup-kind@v0.5.0
        with:
          version: "v0.24.0"

      - name: Verify Cluster is Up
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Deploy Infrastructure (Redis)
        run: |
          kubectl apply -f k8s/redis/redis-deployment.yaml
          # Wait until Redis is actually ready to accept connections
          kubectl wait --for=condition=ready pod -l app=redis --timeout=90s
          
      - name: Deploy Postgres (Database)
        run: |
          # 1. Apply Storage first
          kubectl apply -f k8s/postgres/postgres-storage.yaml
          # 2. Apply the Database and Service
          kubectl apply -f k8s/postgres/postgres-deployment.yaml
          # 3. Wait for the database to be ready
          kubectl wait --for=condition=ready pod -l app=postgres --timeout=90s

      - name: Deploy Collector (Service A)
        run: |
          kubectl apply -f k8s/deployments/collector-deployment.yaml

      - name: Deploy Processor (Service C)
        run: |
          kubectl apply -f k8s/deployments/processor-deployment.yaml

      - name: Verify Full Data Pipeline
        run: |
          # Wait 90 seconds for data to flow
          sleep 90
          
          echo "--- Current Pod Status ---"
          kubectl get pods
          
          echo "--- Processor Logs ---"
          kubectl logs -l app=processor --tail=50
          
          # The NEW check: Look for the Postgres save message
          kubectl logs -l app=processor | grep "Saved to Postgres"