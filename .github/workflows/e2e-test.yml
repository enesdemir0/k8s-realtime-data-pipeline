name: E2E Kubernetes Smoke Test

on:
  push:
    branches: [ "main" ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create KIND Cluster
        uses: engineerd/setup-kind@v0.5.0
        with:
          version: "v0.24.0"

      - name: Deploy Infrastructure (Redis)
        run: |
          kubectl apply -f k8s/redis/redis-deployment.yaml
          kubectl wait --for=condition=ready pod -l app=redis --timeout=90s

      - name: Deploy Postgres (Database)
        run: |
          kubectl apply -f k8s/postgres/
          kubectl wait --for=condition=ready pod -l app=postgres --timeout=90s

      - name: Deploy Microservices (Custom Apps)
        run: |
          kubectl apply -f k8s/deployments/collector-deployment.yaml
          kubectl apply -f k8s/deployments/processor-deployment.yaml
          kubectl apply -f k8s/deployments/dashboard-deployment.yaml
          
      - name: Verify Full Data Pipeline
        run: |
          # We wait 120 seconds because Dashboard and Processor need more time
          echo "Waiting for data to flow through the pipeline..."
          sleep 120
          
          echo "--- Current Pod Status ---"
          kubectl get pods
          
          echo "--- Processor Logs ---"
          kubectl logs -l app=processor --tail=20
          
          echo "--- Dashboard Logs ---"
          kubectl logs -l app=dashboard --tail=20
          
          # 1. Check if Processor successfully saved to Postgres
          kubectl logs -l app=processor | grep "Saved to Postgres"
          
          # 2. Check if Dashboard started correctly
          kubectl logs -l app=dashboard | grep "URL"