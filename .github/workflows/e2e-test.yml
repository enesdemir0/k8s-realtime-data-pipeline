name: E2E Kubernetes Smoke Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create KIND Cluster
        uses: engineerd/setup-kind@v0.5.0
        with:
          version: "v0.24.0"

      - name: Verify Cluster is Up
        run: |
          kubectl cluster-info
          kubectl get nodes

      - name: Deploy Infrastructure (Redis)
        run: |
          kubectl apply -f k8s/redis/redis-deployment.yaml
          # Wait until Redis is actually ready to accept connections
          kubectl wait --for=condition=ready pod -l app=redis --timeout=90s

      - name: Deploy Collector (Service A)
        run: |
          kubectl apply -f k8s/deployments/collector-deployment.yaml
          
      - name: Deploy Processor (Service C)
        run: |
          kubectl apply -f k8s/deployments/processor-deployment.yaml
          
      - name: Verify Full Data Pipeline
        run: |
          # We wait 90 seconds to ensure:
          # 1. Collector fetches from CoinGecko
          # 2. Collector pushes to Redis
          # 3. Processor pulls from Redis
          echo "Waiting for data to flow through the pipeline..."
          sleep 90
          
          echo "--- Current Pod Status ---"
          kubectl get pods
          
          echo "--- Collector Logs ---"
          kubectl logs -l app=collector --tail=20
          
          echo "--- Processor Logs ---"
          kubectl logs -l app=processor --tail=20
          
          # This is the "PASS/FAIL" check. 
          # It looks for "received" or "TREND" in the Processor's logs.
          # If it doesn't find them, the whole GitHub Action will fail.
          kubectl logs -l app=processor | grep -E "received|TREND"